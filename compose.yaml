version: '3.8'

services:
  web:
    build: .
    container_name: flask-app
    ports:
      - "8000:5000"
    environment:
      - FLASK_ENV=production
      - DB_HOST=db
      - DB_NAME=demodb
      - DB_USER=admin
      - DB_PASSWORD=secret123
      - DB_PORT=5432
    restart: always
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: demodb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d demodb"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: